services:
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    environment:
      - TZ=America/Chicago
      - SUBDOMAINS=your-subdomain        # Replace with your subdomain
      - TOKEN=your-duckdns-token-here    # Replace with your DuckDNS token
      - UPDATE_IP=ipv4
      - LOG_FILE=false
    restart: unless-stopped
